name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` demands an exact lockfile match, but a Windows-generated
      # lock omits Linux-only optional binaries. Resolve per-platform instead.
      - run: npm install --no-audit --no-fund

      - name: Build
        env:
          BASE_PATH: kayo
        run: npm run build

      # GitHub Pages has no SPA rewrite, so deep links like /kayo/about would
      # 404. Serving index.html as the 404 page hands them to the router.
      - run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
